name: Deploy to EC2
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app/aws-devops-assignment
            git pull origin main
            /home/ubuntu/.nvm/versions/node/v24.18.0/bin/npm install
            /home/ubuntu/.nvm/versions/node/v24.18.0/bin/pm2 restart myapp
